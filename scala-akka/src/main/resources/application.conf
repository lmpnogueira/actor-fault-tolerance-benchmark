# Cluster host is read from the environment so the benchmark is portable.
# Override with AKKA_HOST when running on a remote/distributed setup.
clusterHost = "127.0.0.1"
clusterHost = ${?AKKA_HOST}

akka {
  log-dead-letters = off
  log-dead-letters-during-shutdown = off
  loggers = ["akka.event.slf4j.Slf4jLogger"]

  actor {
    provider = "cluster"

    serialization-bindings {
      "benchmarking.ClientsManagerCommand" = jackson-json
      "benchmarking.MainGuardianCommand"   = jackson-json
      "benchmarking.DiscoveryCommand"      = jackson-json
      "benchmarking.ChatCommand"           = jackson-json
      "benchmarking.ClientCommand"         = jackson-json
      "benchmarking.SupChatCommand"        = jackson-json
      "benchmarking.InjectorCommand"       = jackson-json
      "benchmarking.Discovery$ChatRefResponse" = jackson-json
      "benchmarking.Discovery$ChatNotFound"    = jackson-json
      "benchmarking.ServersManagerCommand"     = jackson-json
      "messaging.Publisher$PublishEvent"       = jackson-json
    }

    serializers {
      jackson-json = "akka.serialization.jackson.JacksonJsonSerializer"
    }
  }

  remote {
    artery {
      transport = tcp
      canonical.hostname = ${clusterHost}
      canonical.port = 2551
    }
  }

  cluster {
    seed-nodes = [
      "akka://Benchmarking@"${clusterHost}":2551",
      "akka://Benchmarking@"${clusterHost}":2552",
      "akka://Benchmarking@"${clusterHost}":2553"
    ]
    downing-provider-class = "akka.cluster.sbr.SplitBrainResolverProvider"
  }
}

spawn-dispatcher {
    type = Dispatcher
    executor = "fork-join-executor"
    fork-join-executor {
      parallelism-min = 8
      parallelism-max = 64
    }
    throughput = 100
  }